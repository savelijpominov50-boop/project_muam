name: PR Validation
on: [pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck deploy/scripts/**/*.sh
      - name: Hadolint
        run: docker run --rm -i hadolint/hadolint < deploy/docker/auditbeat/Dockerfile
      - name: Yamllint
        run: pip install yamllint && yamllint .